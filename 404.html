<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found | Lamplit Path</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
  <style>
    .not-found {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: var(--space-xl);
    }
    .not-found h1 {
      font-size: clamp(3rem, 8vw, 6rem);
      color: var(--gold);
      margin-bottom: var(--space-sm);
    }
    .not-found h2 {
      margin-bottom: var(--space-md);
    }
    .not-found p {
      color: var(--text-secondary);
      margin-bottom: var(--space-xl);
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

  <nav class="nav" role="navigation" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="/" class="nav__brand">
        <img src="/images/branding/logo.png" alt="Lamplit Path" class="nav__logo">
        Lamplit Path
      </a>
      <button class="nav__toggle" aria-label="Toggle menu" aria-expanded="false">
        <span class="nav__toggle-bar"></span>
        <span class="nav__toggle-bar"></span>
        <span class="nav__toggle-bar"></span>
      </button>
      <ul class="nav__links">
        <li><a href="/types">The 12 Types</a></li>
        <li><a href="https://apps.apple.com/app/id6756659854" class="btn btn--primary btn--sm">Download Free</a></li>
      </ul>
    </div>
  </nav>

  <main class="not-found">
    <div>
      <h1>404</h1>
      <h2>Page not found</h2>
      <p>The path you're looking for doesn't exist. But your spiritual path is still waiting to be discovered.</p>
      <a href="/" class="btn btn--primary btn--lg">Go Home</a>
    </div>
  </main>

  <script>
    const toggle = document.querySelector('.nav__toggle');
    const links = document.querySelector('.nav__links');
    toggle.addEventListener('click', () => {
      const open = links.classList.toggle('nav__links--open');
      toggle.classList.toggle('nav__toggle--open', open);
      toggle.setAttribute('aria-expanded', open);
    });
    links.querySelectorAll('a').forEach(a => a.addEventListener('click', () => {
      links.classList.remove('nav__links--open');
      toggle.classList.remove('nav__toggle--open');
      toggle.setAttribute('aria-expanded', 'false');
    }));
  </script>
</body>
</html>
